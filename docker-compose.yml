services:

  api:
    build: .

    container_name: ai-customer-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - mysql

    restart: always

  mysql:
    image: mysql:8.4

    container_name: ai-customer-mysql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ai_customer_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: password

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

   

    restart: always

volumes:
  mysql_data: